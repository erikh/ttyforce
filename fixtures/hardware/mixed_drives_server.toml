# Server: NVMe boot mirror + large HDD array for ZFS/btrfs storage
# 2 groups: 2x Intel NVMe, 6x Seagate Exos spinning
[network]
[[network.interfaces]]
name = "eno1"
kind = "ethernet"
mac = "a4:bf:01:22:33:44"
has_link = true
has_carrier = true

[[network.interfaces]]
name = "eno2"
kind = "ethernet"
mac = "a4:bf:01:22:33:45"
has_link = false
has_carrier = false

# Intel Optane P5800X NVMe (2x 400GB)
[[disks]]
device = "/dev/nvme0n1"
make = "Intel"
model = "Optane P5800X"
size_bytes = 400088457216
transport = "nvme"
serial = "PHAL1234000A"

[[disks]]
device = "/dev/nvme1n1"
make = "Intel"
model = "Optane P5800X"
size_bytes = 400088457216

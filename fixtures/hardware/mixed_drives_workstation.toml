# Workstation: NVMe boot + SATA bulk storage + spinning rust archive
# 3 groups: 2x Samsung NVMe, 4x Crucial SATA SSD, 2x WD spinning disks
[network]
[[network.interfaces]]
name = "eth0"
kind = "ethernet"
mac = "00:1a:2b:3c:4d:5e"
has_link = true
has_carrier = true


# Playbook: Wifi + 1 disk full install
description = "Full install: wifi select and connect, 1 disk, Btrfs single"
hardware_file = "fixtures/hardware/wifi_1disk.toml"
expected_final_state = "Installed"

inputs = [
    "Confirm",
    { SelectWifiNetwork = 0 },
    { EnterWifiPassword = "correctpassword" },
    "Confirm",
    { SelectRaidOption = 0 },
    { SelectDiskGroup = 0 },
    "ConfirmInstall",
]

expected_screens = [
    "WifiSelect",
    "WifiPassword",
    "NetworkProgress",
    "RaidConfig",
    "DiskGroupSelect",
    "Confirm",
    "InstallProgress",
]

expected_operation_types = [
    "EnableInterface",
    "ScanWifiNetworks",
    "ReceiveWifiScanResults",
    "ConfigureWifiSsidAuth",
    "AuthenticateWifi",
    "CheckIpAddress",
    "CheckUpstreamRouter",
    "CheckInternetRoutability",
    "CheckDnsResolution",
    "SelectPrimaryInterface",
    "PartitionDisk",
    "MkfsBtrfs",
    "MountFilesystem",
    "CreateBtrfsSubvolume",
    "CreateBtrfsSubvolume",
    "CreateBtrfsSubvolume",
    "InstallBaseSystem",
    "GenerateFstab",
    "PersistNetworkConfig",
    "CleanupUnmount",
]

[[simulated_responses]]
operation_match = { by_type = "ScanWifiNetworks" }
result = { WifiScanResults = [
    { ssid = "HomeNetwork", signal_strength = -45, frequency_mhz = 5180, security = "wpa2", reachable = true },
    { ssid = "Neighbor_5G", signal_strength = -72, frequency_mhz = 5240, security = "wpa2", reachable = true },
] }
consume = false

[[simulated_responses]]
operation_match = { by_type = "AuthenticateWifi" }
result = "WifiAuthenticated"
consume = true

[[simulated_responses]]
operation_match = { by_type = "CheckIpAddress" }
result = { IpAssigned = "192.168.1.42" }
consume = false

[[simulated_responses]]
operation_match = { by_type = "CheckUpstreamRouter" }
result = { RouterFound = "192.168.1.1" }
consume = false

[[simulated_responses]]
operation_match = { by_type = "CheckInternetRoutability" }
result = "InternetReachable"
consume = false

[[simulated_responses]]
operation_match = { by_type = "CheckDnsResolution" }
result = { DnsResolved = "93.184.216.34" }
consume = false

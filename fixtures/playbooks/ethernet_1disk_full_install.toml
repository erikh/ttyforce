# Playbook: Ethernet + 1 disk full install (Btrfs, single drive)
description = "Full install: ethernet auto-detect, 1 disk, Btrfs single"
hardware_file = "fixtures/hardware/ethernet_1disk.toml"
expected_final_state = "Installed"

inputs = [
    "Confirm",
    "Confirm",
    { SelectFilesystem = 0 },
    { SelectRaidOption = 0 },
    { SelectDiskGroup = 0 },
    "ConfirmInstall",
]

expected_screens = [
    "NetworkProgress",
    "FilesystemSelect",
    "RaidConfig",
    "DiskGroupSelect",
    "Confirm",
    "InstallProgress",
]

expected_operation_types = [
    "EnableInterface",
    "CheckLinkAvailability",
    "CheckIpAddress",
    "CheckUpstreamRouter",
    "CheckInternetRoutability",
    "CheckDnsResolution",
    "SelectPrimaryInterface",
    "PartitionDisk",
    "MkfsBtrfs",
    "CreateBtrfsSubvolume",
    "CreateBtrfsSubvolume",
    "CreateBtrfsSubvolume",
    "InstallBaseSystem",
]

[[simulated_responses]]
operation_match = { by_type = "CheckLinkAvailability" }
result = "LinkUp"
consume = false

[[simulated_responses]]
operation_match = { by_type = "CheckIpAddress" }
result = { IpAssigned = "192.168.1.20" }
consume = false

[[simulated_responses]]
operation_match = { by_type = "CheckUpstreamRouter" }
result = { RouterFound = "192.168.1.1" }
consume = false

[[simulated_responses]]
operation_match = { by_type = "CheckInternetRoutability" }
result = "InternetReachable"
consume = false

[[simulated_responses]]
operation_match = { by_type = "CheckDnsResolution" }
result = { DnsResolved = "93.184.216.34" }
consume = false

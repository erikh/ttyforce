# Scenario 1: Select a wifi network (index 0), enter correct password, proceed through full install.
# Hardware: wifi_1disk — wlan0 only, 1x Samsung 980 PRO NVMe, HomeNetwork + Neighbor_5G in range.
hardware_file = "fixtures/hardware/wifi_1disk.toml"

# Flow:
#   NetworkConfig -> Confirm (auto-detect wifi, scan) -> WifiSelect
#   WifiSelect -> SelectWifiNetwork(0) -> WifiPassword
#   WifiPassword -> EnterWifiPassword -> NetworkProgress (online)
#   NetworkProgress -> Confirm -> RaidConfig
#   RaidConfig -> SelectRaidOption(0 = Single, only 1 disk) -> DiskGroupSelect
#   DiskGroupSelect -> SelectDiskGroup(0) -> Confirm
#   Confirm -> ConfirmInstall -> InstallProgress
#   InstallProgress -> Confirm -> Reboot
#   Reboot -> RebootSystem
inputs = [
    "Confirm",
    { SelectWifiNetwork = 0 },
    { EnterWifiPassword = "correctpassword" },
    "Confirm",
    { SelectRaidOption = 0 },
    { SelectDiskGroup = 0 },
    "ConfirmInstall",
    "Confirm",
    "RebootSystem",
]

[[simulated_responses]]
operation_match = { by_type = "ScanWifiNetworks" }
result = { WifiScanResults = [
    { ssid = "HomeNetwork", signal_strength = -45, frequency_mhz = 5180, security = "wpa2", reachable = true },
    { ssid = "Neighbor_5G", signal_strength = -72, frequency_mhz = 5240, security = "wpa2", reachable = true },
] }
consume = false

[[simulated_responses]]
operation_match = { by_type = "AuthenticateWifi" }
result = "WifiAuthenticated"
consume = true

[[simulated_responses]]
operation_match = { by_type = "CheckIpAddress" }
result = { IpAssigned = "192.168.1.42" }
consume = false

[[simulated_responses]]
operation_match = { by_type = "CheckUpstreamRouter" }
result = { RouterFound = "192.168.1.1" }
consume = false

[[simulated_responses]]
operation_match = { by_type = "CheckInternetRoutability" }
result = "InternetReachable"
consume = false

[[simulated_responses]]
operation_match = { by_type = "CheckDnsResolution" }
result = { DnsResolved = "93.184.216.34" }
consume = false

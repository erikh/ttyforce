# Scenario 5: Successful wifi connection with full IP provisioning details.
# Verifies IP assignment, router discovery, internet reachability, and DNS resolution.
# Hardware: wifi_1disk — wlan0 only, 1x Samsung 980 PRO NVMe.
hardware_file = "fixtures/hardware/wifi_1disk.toml"

# Flow:
#   NetworkConfig -> Confirm -> WifiSelect (scan populates network list)
#   WifiSelect -> SelectWifiNetwork(0 = HomeNetwork) -> WifiPassword
#   WifiPassword -> EnterWifiPassword("correctpassword") -> WifiAuthenticated
#     -> ConfigureDhcp -> CheckIpAddress(192.168.1.100) -> CheckUpstreamRouter(192.168.1.1)
#     -> CheckInternetRoutability -> CheckDnsResolution(93.184.216.34)
#     -> SelectPrimaryInterface -> NetworkProgress (fully online)
#   NetworkProgress -> Confirm -> FilesystemSelect
#   FilesystemSelect -> SelectFilesystem(0 = Btrfs) -> RaidConfig
#   RaidConfig -> SelectRaidOption(0 = Single) -> DiskGroupSelect
#   DiskGroupSelect -> SelectDiskGroup(0) -> Confirm
#   Confirm -> ConfirmInstall -> InstallProgress
#   InstallProgress -> Confirm -> Reboot
#   Reboot -> RebootSystem
inputs = [
    "Confirm",
    { SelectWifiNetwork = 0 },
    { EnterWifiPassword = "correctpassword" },
    "Confirm",
    { SelectFilesystem = 0 },
    { SelectRaidOption = 0 },
    { SelectDiskGroup = 0 },
    "ConfirmInstall",
    "Confirm",
    "RebootSystem",
]

[[simulated_responses]]
operation_match = { by_type = "ScanWifiNetworks" }
result = { WifiScanResults = [
    { ssid = "HomeNetwork", signal_strength = -45, frequency_mhz = 5180, security = "wpa2", reachable = true },
    { ssid = "Neighbor_5G", signal_strength = -72, frequency_mhz = 5240, security = "wpa2", reachable = true },
] }
consume = false

[[simulated_responses]]
operation_match = { by_type = "AuthenticateWifi" }
result = "WifiAuthenticated"
consume = false

[[simulated_responses]]
operation_match = { by_type = "CheckIpAddress" }
result = { IpAssigned = "192.168.1.100" }
consume = false

[[simulated_responses]]
operation_match = { by_type = "CheckUpstreamRouter" }
result = { RouterFound = "192.168.1.1" }
consume = false

[[simulated_responses]]
operation_match = { by_type = "CheckInternetRoutability" }
result = "InternetReachable"
consume = false

[[simulated_responses]]
operation_match = { by_type = "CheckDnsResolution" }
result = { DnsResolved = "93.184.216.34" }
consume = false

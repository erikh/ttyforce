# Drop this into /etc/systemd/system/getty@tty1.service.d/override.conf
# to replace the login prompt on tty1 with the Town OS installer.
#
# Alternative to townos-installer.service for simpler setups where you
# want the installer to always run on tty1 (e.g., install media).
[Service]
ExecStart=
ExecStart=-/usr/bin/ttyforce
StandardInput=tty
StandardOutput=tty
TTYPath=/dev/tty1
TTYReset=yes
TTYVHangup=yes
